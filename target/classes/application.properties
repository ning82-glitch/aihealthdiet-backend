# ============= ????? =============
server.port=8081
server.servlet.context-path=/
server.servlet.session.timeout=30m

# ============= ????? (MySQL) =============
# ?????
spring.datasource.url=jdbc:mysql://localhost:3306/aihealthdiet?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ????? (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ============= JPA & Hibernate ?? =============
# ????/?????
spring.jpa.hibernate.ddl-auto=update
# ????? SQL
spring.jpa.show-sql=true
# ??? SQL
spring.jpa.properties.hibernate.format_sql=true
# ?????
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
# ? ???????
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# ? ?????????
spring.jpa.hibernate.naming.implicit-strategy=org.springframework.boot.orm.jpa.hibernate.SpringImplicitNamingStrategy

# ??????
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ????????
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ============= ???? =============
logging.level.com.aihealthdiet=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ??????
logging.file.name=logs/aihealthdiet.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============= ???? (CORS) =============
# ????????
cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:5175
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true
cors.max-age=3600

# ============= ???? =============
# ?? Spring Security ?????????????? Spring Security?
spring.security.user.name=user
spring.security.user.password=password

# ============= ?????? =============
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.resolve-lazily=false

# ============= ?? Spring Boot ?? =============
# ????
spring.application.name=aihealthdiet-backend
# Banner
spring.banner.location=classpath:banner.txt
# ???
spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.exclude=static/**,public/**

# ============= ??????? =============
# ?? Actuator ??
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true